<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuários — Rosas & Tortas Confeitaria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { DEFAULT:'#F4A7B9', light:'#FAD4DE', dark:'#E8789A', deep:'#C9546E' },
            mint: { DEFAULT:'#A8D5BA', light:'#D4EDE0', dark:'#6FBA96', deep:'#4A9B72' },
          },
          fontFamily: { display: ['Playfair Display','serif'] },
          boxShadow: {
            soft: '0 2px 16px rgba(244,167,185,0.15)',
            card: '0 4px 24px rgba(200,120,140,0.10)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="petal-bg" data-page="usuarios">

<div class="page-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span style="font-size:1.5rem;">🌹</span>
      <div>
        <p class="font-display" style="font-size:.875rem;font-weight:600;color:#1f2937;line-height:1.2;">Rosas & Tortas</p>
        <p style="font-size:.7rem;color:#d1d5db;">Confeitaria</p>
      </div>
    </div>
    <p class="sidebar-label">Menu</p>
    <a class="nav-item" data-nav="dashboard"  href="dashboard.html"><i class="fa-solid fa-house-chimney icon"></i> Dashboard</a>
    <a class="nav-item" data-nav="produtos"   href="produtos-lista.html"><i class="fa-solid fa-cake-candles icon"></i> Produtos</a>
    <a class="nav-item" data-nav="clientes"   href="#"><i class="fa-solid fa-users icon"></i> Clientes</a>
    <a class="nav-item" data-nav="pedidos"    href="#"><i class="fa-solid fa-bag-shopping icon"></i> Pedidos</a>
    <a class="nav-item" data-nav="pagamentos" href="pagamentos-lista.html"><i class="fa-solid fa-credit-card icon"></i> Formas de Pagamento</a>
    <a class="nav-item" data-nav="usuarios"   href="usuarios-lista.html"><i class="fa-solid fa-user-shield icon"></i> Usuários</a>
    <div style="flex:1;"></div>
    <div style="border-top:1px solid #FFF0F4;padding-top:.75rem;margin-top:.75rem;">
      <a class="nav-item" href="login.html" style="color:#9ca3af;">
        <i class="fa-solid fa-right-from-bracket icon"></i> Sair
      </a>
    </div>
  </aside>

  <!-- ── CONTEÚDO ── -->
  <main class="page-main">

    <!-- Header -->
    <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <div>
        <h2 class="font-display" style="font-size:1.5rem;font-weight:600;color:#1f2937;">Usuários</h2>
        <p style="font-size:.875rem;color:#9ca3af;margin-top:.25rem;">Gerencie os acessos ao sistema</p>
      </div>
      <a class="btn-primary" href="usuario-form.html?modo=novo">
        <i class="fa-solid fa-plus"></i> Novo usuário
      </a>
    </div>

    <!-- Filtros -->
    <div class="card fade-up delay-1"
         style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1.25rem;padding:1rem;">
      <input id="filtro-nome" type="text" placeholder="🔍  Buscar por nome ou e-mail..." class="form-input"
             style="max-width:260px;" oninput="filtrar()">
      <button class="btn-mint" onclick="filtrar()">
        <i class="fa-solid fa-magnifying-glass"></i> Filtrar
      </button>
      <button class="btn-secondary" onclick="limparFiltros()">
        <i class="fa-solid fa-xmark"></i> Limpar
      </button>
    </div>

    <!-- Tabela -->
    <div class="card fade-up delay-2" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>CPF</th>
            <th style="text-align:center;">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-usuarios"></tbody>
      </table>

      <!-- Paginação -->
      <div style="display:flex;align-items:center;justify-content:space-between;
                  padding:.75rem 1rem;border-top:1px solid #FFF0F4;font-size:.75rem;color:#9ca3af;">
        <span id="pag-info"></span>
        <div id="pag-botoes" style="display:flex;gap:.25rem;"></div>
      </div>
    </div>

  </main>
</div>

<!-- Modal confirmação exclusão -->
<div id="modal-excluir" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="width:3.5rem;height:3.5rem;border-radius:1rem;background:#FAD4DE;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <i class="fa-solid fa-trash-can" style="font-size:1.25rem;color:#C9546E;"></i>
    </div>
    <h3 class="font-display" style="font-size:1.125rem;font-weight:600;color:#1f2937;margin-bottom:.5rem;">
      Excluir usuário <span id="modal-usuario-nome" style="font-weight:700;color:#C9546E;"></span>?
    </h3>
    <p style="font-size:.875rem;color:#9ca3af;margin-bottom:1.5rem;">
      Esta ação não pode ser desfeita.
    </p>
    <div style="display:flex;gap:.75rem;justify-content:center;">
      <button class="btn-secondary" onclick="fecharModal('modal-excluir')">Cancelar</button>
      <button class="btn-danger" onclick="confirmarExclusao()">
        <i class="fa-solid fa-trash-can"></i> Excluir
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden">
  <i id="toast-icon" class="fa-solid fa-circle-check" style="color:#4A9B72;"></i>
  <span id="toast-msg">Operação realizada!</span>
</div>

<script src="../js/app.js"></script>
<script>
  // ── Dados de exemplo (remover ao integrar) ───────────────────────
  let usuarios = [];
  //   { id:1, nome_usuario:'Admin Geral',    email_usuario:'admin@loja.com',      cpf:'000.000.000-00' },
  //   { id:2, nome_usuario:'Maria Fernanda', email_usuario:'maria@loja.com',       cpf:'123.456.789-09' },
  //   { id:3, nome_usuario:'João Atendente', email_usuario:'joao@loja.com',        cpf:'987.654.321-00' },
  //   { id:4, nome_usuario:'Paula Caixa',    email_usuario:'paula@loja.com',       cpf:'111.222.333-44' },
  // ];

  // ── Integrar com backend Go ──────────────────────────────────────
  async function carregarUsuarios() {
    const res   = await fetch('http://localhost:8080/api/todos/usuario');
    usuarios    = await res.json();
    usuariosFiltrados = [...usuarios];
    renderTabela(usuariosFiltrados);
  }
  
  carregarUsuarios();

  const POR_PAGINA = 10;
  let paginaAtual = 1;
  let usuariosFiltrados = [...usuarios];
  let idParaExcluir = null;

  // ── Render ───────────────────────────────────────────────────────
  function renderTabela(lista) {
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = lista.slice(inicio, inicio + POR_PAGINA);

    // Avatar com iniciais
    function iniciais(nome) {
      return nome.split(' ').slice(0,2).map(p => p[0]).join('').toUpperCase();
    }

    document.getElementById('tbody-usuarios').innerHTML = pagina.map(u => `
      <tr>
        <td style="color:#9ca3af;">#${u.id_usuario}</td>
        <td>
          <div style="display:flex;align-items:center;gap:.625rem;">
            <div style="width:2rem;height:2rem;border-radius:9999px;background:#FAD4DE;flex-shrink:0;
                        display:flex;align-items:center;justify-content:center;
                        font-size:.65rem;font-weight:700;color:#C9546E;">
              ${iniciais(u.nome_usuario)}
            </div>
            <span style="font-weight:500;color:#1f2937;">${u.nome_usuario}</span>
          </div>
        </td>
        <td style="color:#6b7280;">${u.email_usuario}</td>
        <td style="color:#6b7280;">${u.cpf}</td>
        <td style="text-align:center;">
          <div style="display:inline-flex;gap:.25rem;">
            <a href="usuario-form.html?modo=editar&id=${u.id_usuario}"
               style="display:inline-flex;align-items:center;justify-content:center;
                      width:2rem;height:2rem;border-radius:.5rem;color:#E8789A;
                      background:transparent;border:none;cursor:pointer;text-decoration:none;transition:background .2s;"
               onmouseover="this.style.background='#FAD4DE'" onmouseout="this.style.background='transparent'"
               title="Editar">
              <i class="fa-solid fa-pen-to-square" style="font-size:.875rem;"></i>
            </a>
            <button onclick="pedirExclusao(${u.id_usuario})"
                    style="display:inline-flex;align-items:center;justify-content:center;
                           width:2rem;height:2rem;border-radius:.5rem;color:#d1d5db;
                           background:transparent;border:none;cursor:pointer;transition:all .2s;"
                    onmouseover="this.style.background='#fee2e2';this.style.color='#ef4444'"
                    onmouseout="this.style.background='transparent';this.style.color='#d1d5db'"
                    title="Excluir">
              <i class="fa-solid fa-trash-can" style="font-size:.875rem;"></i>
            </button>
          </div>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:2rem;">Nenhum usuário encontrado.</td></tr>';

    // Paginação
    const total  = lista.length;
    const paginas = Math.ceil(total / POR_PAGINA);
    document.getElementById('pag-info').textContent =
      `Mostrando ${Math.min(inicio+1,total)}–${Math.min(inicio+POR_PAGINA,total)} de ${total} registros`;

    const botoes = document.getElementById('pag-botoes');
    botoes.innerHTML = '';
    for (let i = 1; i <= paginas; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.style.cssText = `padding:.25rem .625rem;border-radius:.5rem;font-size:.75rem;border:none;cursor:pointer;
                           background:${i===paginaAtual?'#FAD4DE':'transparent'};
                           color:${i===paginaAtual?'#C9546E':'#9ca3af'};font-weight:${i===paginaAtual?'600':'400'};`;
      btn.onclick = () => { paginaAtual = i; renderTabela(usuariosFiltrados); };
      botoes.appendChild(btn);
    }
  }

  // ── Filtros ──────────────────────────────────────────────────────
  function filtrar() {
    const texto = document.getElementById('filtro-nome').value.trim().toLowerCase();

    usuariosFiltrados = usuarios.filter(u => {
      const matchesTexto = !texto ||
        u.nome_usuario.toLowerCase().includes(texto) ||
        u.email_usuario.toLowerCase().includes(texto);
      return matchesTexto;
    });

    paginaAtual = 1;
    renderTabela(usuariosFiltrados);
  }

  function limparFiltros() {
    document.getElementById('filtro-nome').value = '';
    usuariosFiltrados = [...usuarios];
    paginaAtual = 1;
    renderTabela(usuariosFiltrados);
  }

  // ── Exclusão ─────────────────────────────────────────────────────
  function pedirExclusao(id) {
    idParaExcluir = id;
    const usuario = usuarios.find(u => u.id_usuario === id);
    document.getElementById('modal-usuario-nome').textContent = usuario ? usuario.nome_usuario : '';
    abrirModal('modal-excluir');
  }

  async function confirmarExclusao() {
    fecharModal('modal-excluir');

    const res = await fetch(`http://localhost:8080/api/usuarios/excluir/${idParaExcluir}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' }
    });

    if (!res.ok) {
      showToast('Erro ao excluir usuário.', 'erro');
      return;
    }

    usuarios = usuarios.filter(u => u.id_usuario !== idParaExcluir);
    usuariosFiltrados = usuariosFiltrados.filter(u => u.id_usuario !== idParaExcluir);
    renderTabela(usuariosFiltrados);
    showToast('Usuário excluído com sucesso.');
  }

  // ── Init ─────────────────────────────────────────────────────────
  renderTabela(usuarios);
</script>
</body>
</html>
