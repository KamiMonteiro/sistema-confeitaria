<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos — Rosas & Tortas Confeitaria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { DEFAULT:'#F4A7B9', light:'#FAD4DE', dark:'#E8789A', deep:'#C9546E' },
            mint: { DEFAULT:'#A8D5BA', light:'#D4EDE0', dark:'#6FBA96', deep:'#4A9B72' },
          },
          fontFamily: { display: ['Playfair Display','serif'] },
          boxShadow: {
            soft: '0 2px 16px rgba(244,167,185,0.15)',
            card: '0 4px 24px rgba(200,120,140,0.10)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="petal-bg" data-page="produtos">

<div class="page-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span style="font-size:1.5rem;">🌹</span>
      <div>
        <p class="font-display" style="font-size:.875rem;font-weight:600;color:#1f2937;line-height:1.2;">Rosas & Tortas</p>
        <p style="font-size:.7rem;color:#d1d5db;">Confeitaria</p>
      </div>
    </div>
    <p class="sidebar-label">Menu</p>
    <a class="nav-item" data-nav="dashboard" href="dashboard.html"><i class="fa-solid fa-house-chimney icon"></i> Dashboard</a>
    <a class="nav-item" data-nav="produtos"   href="produtos-lista.html"><i class="fa-solid fa-cake-candles icon"></i> Produtos</a>
    <a class="nav-item" data-nav="clientes"   href="#"><i class="fa-solid fa-users icon"></i> Clientes</a>
    <a class="nav-item" data-nav="pedidos"    href="#"><i class="fa-solid fa-bag-shopping icon"></i> Pedidos</a>
    <a class="nav-item" data-nav="pagamentos" href="#"><i class="fa-solid fa-credit-card icon"></i> Formas de Pag.</a>
    <a class="nav-item" data-nav="usuarios"   href="#"><i class="fa-solid fa-user-shield icon"></i> Usuários</a>
    <div style="flex:1;"></div>
    <div style="border-top:1px solid #FFF0F4;padding-top:.75rem;margin-top:.75rem;">
      <a class="nav-item" href="login.html" style="color:#9ca3af;">
        <i class="fa-solid fa-right-from-bracket icon"></i> Sair
      </a>
    </div>
  </aside>

  <!-- ── CONTEÚDO ── -->
  <main class="page-main">

    <!-- Header -->
    <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <div>
        <h2 class="font-display" style="font-size:1.5rem;font-weight:600;color:#1f2937;">Produtos</h2>
        <p style="font-size:.875rem;color:#9ca3af;margin-top:.25rem;">Gerencie o catálogo da confeitaria</p>
      </div>
      <a class="btn-primary" href="produto-form.html?modo=novo">
        <i class="fa-solid fa-plus"></i> Novo produto
      </a>
    </div>

    <!-- Filtros -->
    <div class="card fade-up delay-1"
         style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1.25rem;padding:1rem;">
      <input id="filtro-nome" type="text" placeholder="🔍  Buscar produto..." class="form-input"
             style="max-width:220px;" oninput="filtrar()">
      <select id="filtro-cat" class="form-input" style="max-width:170px;" onchange="filtrar()">
        <option value="">Todas categorias</option>
        <option>Bolos</option><option>Tortas</option><option>Doces</option>
        <option>Salgados</option><option>Bebidas</option>
      </select>
      <select id="filtro-ativo" class="form-input" style="max-width:130px;" onchange="filtrar()">
        <option value="">Status</option>
        <option value="SIM">Ativo</option>
        <option value="NAO">Inativo</option>
      </select>
      <button class="btn-mint" onclick="filtrar()">
        <i class="fa-solid fa-magnifying-glass"></i> Filtrar
      </button>
      <button class="btn-secondary" onclick="limparFiltros()">
        <i class="fa-solid fa-xmark"></i> Limpar
      </button>
    </div>

    <!-- Tabela -->
    <div class="card fade-up delay-2" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço Unit.</th>
            <th>Status</th>
            <th style="text-align:center;">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-produtos"></tbody>
      </table>

      <!-- Paginação -->
      <div id="paginacao"
           style="display:flex;align-items:center;justify-content:space-between;
                  padding:.75rem 1rem;border-top:1px solid #FFF0F4;font-size:.75rem;color:#9ca3af;">
        <span id="pag-info"></span>
        <div id="pag-botoes" style="display:flex;gap:.25rem;"></div>
      </div>
    </div>

  </main>
</div>

<!-- Modal confirmação exclusão -->
<div id="modal-excluir" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="width:3.5rem;height:3.5rem;border-radius:1rem;background:#FAD4DE;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <i class="fa-solid fa-trash-can" style="font-size:1.25rem;color:#C9546E;"></i>
    </div>
    <h3 class="font-display" style="font-size:1.125rem;font-weight:600;color:#1f2937;margin-bottom:.5rem;">
      Excluir produto?
    </h3>
    <p style="font-size:.875rem;color:#9ca3af;margin-bottom:1.5rem;">
      Esta ação não pode ser desfeita.
    </p>
    <div style="display:flex;gap:.75rem;justify-content:center;">
      <button class="btn-secondary" onclick="fecharModal('modal-excluir')">Cancelar</button>
      <button class="btn-danger" onclick="confirmarExclusao()">
        <i class="fa-solid fa-trash-can"></i> Excluir
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden">
  <i id="toast-icon" class="fa-solid fa-circle-check" style="color:#4A9B72;"></i>
  <span id="toast-msg">Operação realizada!</span>
</div>

<script src="js/app.js"></script>
<script>
  // ── Dados de exemplo (remover ao integrar) ───────────────────────
  let produtos = [
    { id:1, nome:'Torta de Morango',   categoria:'Tortas',   preco:89.90,  ativo:'SIM' },
    { id:2, nome:'Bolo de Cenoura',    categoria:'Bolos',    preco:65.00,  ativo:'SIM' },
    { id:3, nome:'Brigadeiro Gourmet', categoria:'Doces',    preco:4.50,   ativo:'SIM' },
    { id:4, nome:'Cheesecake',         categoria:'Tortas',   preco:110.00, ativo:'SIM' },
    { id:5, nome:'Pão de Mel',         categoria:'Doces',    preco:7.00,   ativo:'NAO' },
    { id:6, nome:'Quiche Lorraine',    categoria:'Salgados', preco:45.00,  ativo:'SIM' },
  ];

  // ── Integração com backend Go ────────────────────────────────────
  // async function carregarProdutos() {
  //   const res  = await fetch('/api/produtos', { headers:{ Authorization:'Bearer '+localStorage.getItem('token') }});
  //   produtos   = await res.json();
  //   renderTabela(produtos);
  // }
  // carregarProdutos();

  // ── Estado paginação ─────────────────────────────────────────────
  const POR_PAGINA = 10;
  let   paginaAtual = 1;
  let   produtosFiltrados = [...produtos];
  let   idParaExcluir = null;

  // ── Render ───────────────────────────────────────────────────────
  function renderTabela(lista) {
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = lista.slice(inicio, inicio + POR_PAGINA);

    document.getElementById('tbody-produtos').innerHTML = pagina.map(p => `
      <tr>
        <td style="color:#9ca3af;">#${p.id}</td>
        <td style="font-weight:500;color:#1f2937;">${p.nome}</td>
        <td>${p.categoria}</td>
        <td>${formatarMoeda(p.preco)}</td>
        <td>
          <span class="badge ${p.ativo==='SIM' ? 'badge-green' : 'badge-gray'}">
            ${p.ativo==='SIM' ? 'Ativo' : 'Inativo'}
          </span>
        </td>
        <td style="text-align:center;">
          <div style="display:inline-flex;gap:.25rem;">
            <a href="produto-form.html?modo=editar&id=${p.id}"
               style="display:inline-flex;align-items:center;justify-content:center;
                      width:2rem;height:2rem;border-radius:.5rem;color:#E8789A;
                      background:transparent;border:none;cursor:pointer;transition:background .2s;"
               onmouseover="this.style.background='#FAD4DE'" onmouseout="this.style.background='transparent'"
               title="Editar">
              <i class="fa-solid fa-pen-to-square" style="font-size:.875rem;"></i>
            </a>
            <button onclick="pedirExclusao(${p.id})"
                    style="display:inline-flex;align-items:center;justify-content:center;
                           width:2rem;height:2rem;border-radius:.5rem;color:#d1d5db;
                           background:transparent;border:none;cursor:pointer;transition:all .2s;"
                    onmouseover="this.style.background='#fee2e2';this.style.color='#ef4444'"
                    onmouseout="this.style.background='transparent';this.style.color='#d1d5db'"
                    title="Excluir">
              <i class="fa-solid fa-trash-can" style="font-size:.875rem;"></i>
            </button>
          </div>
        </td>
      </tr>
    `).join('') || '<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:2rem;">Nenhum produto encontrado.</td></tr>';

    // Paginação
    const total  = lista.length;
    const paginas = Math.ceil(total / POR_PAGINA);
    document.getElementById('pag-info').textContent =
      `Mostrando ${Math.min(inicio+1,total)}–${Math.min(inicio+POR_PAGINA,total)} de ${total} registros`;

    const botoes = document.getElementById('pag-botoes');
    botoes.innerHTML = '';
    for (let i = 1; i <= paginas; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.style.cssText = `padding:.25rem .625rem;border-radius:.5rem;font-size:.75rem;border:none;cursor:pointer;
                           background:${i===paginaAtual?'#FAD4DE':'transparent'};
                           color:${i===paginaAtual?'#C9546E':'#9ca3af'};font-weight:${i===paginaAtual?'600':'400'};`;
      btn.onclick = () => { paginaAtual = i; renderTabela(produtosFiltrados); };
      botoes.appendChild(btn);
    }
  }

  // ── Filtros ──────────────────────────────────────────────────────
  function filtrar() {
    const nome  = document.getElementById('filtro-nome').value.toLowerCase();
    const cat   = document.getElementById('filtro-cat').value;
    const ativo = document.getElementById('filtro-ativo').value;
    produtosFiltrados = produtos.filter(p =>
      (!nome  || p.nome.toLowerCase().includes(nome)) &&
      (!cat   || p.categoria === cat) &&
      (!ativo || p.ativo === ativo)
    );
    paginaAtual = 1;
    renderTabela(produtosFiltrados);
  }

  function limparFiltros() {
    document.getElementById('filtro-nome').value  = '';
    document.getElementById('filtro-cat').value   = '';
    document.getElementById('filtro-ativo').value = '';
    produtosFiltrados = [...produtos];
    paginaAtual = 1;
    renderTabela(produtosFiltrados);
  }

  // ── Exclusão ─────────────────────────────────────────────────────
  function pedirExclusao(id) {
    idParaExcluir = id;
    abrirModal('modal-excluir');
  }

  async function confirmarExclusao() {
    fecharModal('modal-excluir');

    // ── Integrar com backend Go ──────────────────────────────────
    // await fetch(`/api/produtos/${idParaExcluir}`, {
    //   method: 'DELETE',
    //   headers: { Authorization: 'Bearer '+localStorage.getItem('token') }
    // });
    // ────────────────────────────────────────────────────────────

    produtos = produtos.filter(p => p.id !== idParaExcluir);
    produtosFiltrados = produtosFiltrados.filter(p => p.id !== idParaExcluir);
    renderTabela(produtosFiltrados);
    showToast('Produto excluído com sucesso.');
  }

  // ── Init ─────────────────────────────────────────────────────────
  renderTabela(produtos);
</script>
</body>
</html>
