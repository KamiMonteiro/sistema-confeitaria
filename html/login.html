<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Rosas & Tortas Confeitaria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { DEFAULT:'#F4A7B9', light:'#FAD4DE', dark:'#E8789A', deep:'#C9546E' },
            mint: { DEFAULT:'#A8D5BA', light:'#D4EDE0', dark:'#6FBA96', deep:'#4A9B72' },
          },
          fontFamily: { display: ['Playfair Display','serif'] },
          boxShadow: {
            soft: '0 2px 16px rgba(244,167,185,0.2)',
            card: '0 4px 24px rgba(200,120,140,0.12)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="min-h-screen petal-bg flex items-center justify-center px-4" data-page="login">

  <div class="w-full max-w-sm fade-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-16 rounded-2xl mb-3"
           style="background:#cc7c91;box-shadow:0 2px 16px rgba(244,167,185,.3);">
        <span style="font-size:1.75rem;">🌼🧁</span>
      </div>
      <h1 class="font-display text-2xl font-semibold" style="color:#1f2937;">Rosas & Tortas</h1>
      <p style="font-size:.875rem;color:#9ca3af;margin-top:.25rem;">Confeitaria · Sistema de Gestão</p>
    </div>

    <!-- Card -->
    <div class="card" style="padding:2rem;">
      <h2 class="font-display" style="font-size:1.125rem;font-weight:600;color:#374151;margin-bottom:1.5rem;">
        Bem-vindo de volta 
      </h2>

      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div>
          <label style="display:block;font-size:.75rem;font-weight:500;color:#6b7280;margin-bottom:.375rem;">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com" class="form-input">
        </div>
        <div>
          <label style="display:block;font-size:.75rem;font-weight:500;color:#6b7280;margin-bottom:.375rem;">Senha</label>
          <input id="login-senha" type="password" placeholder="••••••••" class="form-input">
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:#9ca3af;">
          <label style="display:flex;align-items:center;gap:.375rem;cursor:pointer;">
            <input type="checkbox" style="accent-color:#F4A7B9;"> Lembrar acesso
          </label>
          <a href="#" style="color:#C9546E;">Esqueci a senha</a>
        </div>
      </div>

      <button class="btn-primary" style="width:100%;justify-content:center;margin-top:1.5rem;"
              onclick="fazerLogin()">
        <i class="fa-solid fa-arrow-right-to-bracket"></i> Entrar
      </button>

      <p id="login-erro" style="font-size:.75rem;color:#ef4444;text-align:center;margin-top:.75rem;display:none;">
        <i class="fa-solid fa-circle-exclamation"></i> Preencha e-mail e senha.
      </p>
    </div>

    <p style="text-align:center;font-size:.7rem;color:#d1d5db;margin-top:1.5rem;">
      © 2025 Rosas & Tortas Confeitaria
    </p>
  </div>

  <script src="../js/app.js"></script>
  <script>
    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;

      if (!email || !senha) {
        document.getElementById('login-erro').style.display = 'block';
        return;
      }

      // ── Integração com backend Go ──────────────────────────────
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();
      if (!res.ok) { document.getElementById('login-erro').style.display = 'block'; return; }
      localStorage.setItem('token', data.token);
      // ───────────────────────────────────────────────────────────

      window.location.href = 'dashboard.html';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
  </script>
</body>
</html>
