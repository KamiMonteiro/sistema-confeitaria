<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formas de Pagamento — Rosas & Tortas Confeitaria</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js" defer></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            rose: { DEFAULT:'#F4A7B9', light:'#FAD4DE', dark:'#E8789A', deep:'#C9546E' },
            mint: { DEFAULT:'#A8D5BA', light:'#D4EDE0', dark:'#6FBA96', deep:'#4A9B72' },
          },
          fontFamily: { display: ['Playfair Display','serif'] },
          boxShadow: {
            soft: '0 2px 16px rgba(244,167,185,0.15)',
            card: '0 4px 24px rgba(200,120,140,0.10)',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="petal-bg" data-page="pagamentos">

<div class="page-layout">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span style="font-size:1.5rem;">🌹</span>
      <div>
        <p class="font-display" style="font-size:.875rem;font-weight:600;color:#1f2937;line-height:1.2;">Rosas & Tortas</p>
        <p style="font-size:.7rem;color:#d1d5db;">Confeitaria</p>
      </div>
    </div>
    <p class="sidebar-label">Menu</p>
    <a class="nav-item" data-nav="dashboard" href="dashboard.html"><i class="fa-solid fa-house-chimney icon"></i> Dashboard</a>
    <a class="nav-item" data-nav="produtos" href="produtos-lista.html"><i class="fa-solid fa-cake-candles icon"></i> Produtos</a>
    <a class="nav-item" data-nav="clientes" href="#"><i class="fa-solid fa-users icon"></i> Clientes</a>
    <a class="nav-item" data-nav="pedidos" href="#"><i class="fa-solid fa-bag-shopping icon"></i> Pedidos</a>
    <a class="nav-item" data-nav="pagamentos" href="pagamentos-lista.html"><i class="fa-solid fa-credit-card icon"></i> Formas de Pagamento</a>
    <a class="nav-item" data-nav="usuarios" href="usuarios-lista.html"><i class="fa-solid fa-user-shield icon"></i> Usuários</a>
    <div style="flex:1;"></div>
    <div style="border-top:1px solid #FFF0F4;padding-top:.75rem;margin-top:.75rem;">
      <a class="nav-item" href="login.html" style="color:#9ca3af;">
        <i class="fa-solid fa-right-from-bracket icon"></i> Sair
      </a>
    </div>
  </aside>

  <!-- ── CONTEÚDO ── -->
  <main class="page-main">

    <!-- Header -->
    <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
      <div>
        <h2 class="font-display" style="font-size:1.5rem;font-weight:600;color:#1f2937;">Formas de Pagamento</h2>
        <p style="font-size:.875rem;color:#9ca3af;margin-top:.25rem;">Gerencie as formas de pagamento do sistema</p>
      </div>
      <a class="btn-primary" href="pagamento-form.html?modo=novo">
        <i class="fa-solid fa-plus"></i> Nova forma
      </a>
    </div>

    <!-- Busca por ID e filtro de status -->
    <div class="card fade-up delay-1"
         style="display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin-bottom:1.25rem;padding:1rem;">
      <input id="filtro-id" type="text" placeholder="🔍  Buscar por ID..." class="form-input"
             style="max-width:260px;">
      <select id="filtro-status" class="form-input" style="max-width:130px;" onchange="filtrarStatus()">
        <option value="">Status</option>
        <option value="SIM">Ativo</option>
        <option value="NAO">Inativo</option>
      </select>
      <button class="btn-mint" onclick="buscarForma()">
        <i class="fa-solid fa-magnifying-glass"></i> Buscar
      </button>
      <button class="btn-secondary" onclick="mostrarTodos()">
        <i class="fa-solid fa-list"></i> Mostrar todos
      </button>
    </div>

    <!-- Tabela -->
    <div class="card fade-up delay-2" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Status</th>
            <th style="text-align:center;">Ações</th>
          </tr>
        </thead>
        <tbody id="tbody-pagamentos"></tbody>
      </table>

      <!-- Paginação -->
      <div id="paginacao"
           style="display:flex;align-items:center;justify-content:space-between;
                  padding:.75rem 1rem;border-top:1px solid #FFF0F4;font-size:.75rem;color:#9ca3af;">
        <span id="pag-info"></span>
        <div id="pag-botoes" style="display:flex;gap:.25rem;"></div>
      </div>
    </div>

  </main>
</div>

<!-- Modal confirmação exclusão -->
<div id="modal-excluir" class="modal-overlay hidden">
  <div class="modal-box">
    <div style="width:3.5rem;height:3.5rem;border-radius:1rem;background:#FAD4DE;
                display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;">
      <i class="fa-solid fa-trash-can" style="font-size:1.25rem;color:#C9546E;"></i>
    </div>
    <h3 class="font-display" style="font-size:1.125rem;font-weight:600;color:#1f2937;margin-bottom:.5rem;">
      Excluir forma de pagamento?
    </h3>
    <p style="font-size:.95rem;color:#1f2937;font-weight:600;margin-bottom:.5rem;" id="nome-pagamento-exclusao">
      <!-- Nome será inserido aqui -->
    </p>
    <p style="font-size:.875rem;color:#9ca3af;margin-bottom:1.5rem;">
      Esta ação não pode ser desfeita.
    </p>
    <div style="display:flex;gap:.75rem;justify-content:center;">
      <button class="btn-secondary" onclick="fecharModal('modal-excluir')">Cancelar</button>
      <button class="btn-danger" onclick="confirmarExclusao()">
        <i class="fa-solid fa-trash-can"></i> Excluir
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast hidden">
  <i id="toast-icon" class="fa-solid fa-circle-check" style="color:#4A9B72;"></i>
  <span id="toast-msg">Operação realizada!</span>
</div>

<script src="../js/app.js"></script>
<script>
  let formas = [];
  const POR_PAGINA = 10;
  let paginaAtual = 1;
  let formasFiltradas = [];
  let idParaExcluir = null;
  let nomeParaExcluir = '';

  function renderTabela(lista) {
    const inicio = (paginaAtual - 1) * POR_PAGINA;
    const pagina = lista.slice(inicio, inicio + POR_PAGINA);

    document.getElementById('tbody-pagamentos').innerHTML = pagina.map(f => {
      const ativoAtivo = ['SIM', 'S'].includes(String(f.ativo).toUpperCase());
      return `
      <tr>
        <td style="font-weight:500;color:#1f2937;">${f.nome}</td>
        <td>
          <span class="badge ${ativoAtivo ? 'badge-green' : 'badge-gray'}">
            ${ativoAtivo ? 'Ativa' : 'Inativa'}
          </span>
        </td>
        <td style="text-align:center;">
          <div style="display:inline-flex;gap:.25rem;">
            <a href="pagamento-form.html?modo=editar&id=${f.id}"
               style="display:inline-flex;align-items:center;justify-content:center;
                      width:2rem;height:2rem;border-radius:.5rem;color:#E8789A;
                      background:transparent;border:none;cursor:pointer;transition:background .2s;"
               onmouseover="this.style.background='#FAD4DE'" onmouseout="this.style.background='transparent'"
               title="Editar">
              <i class="fa-solid fa-pen-to-square" style="font-size:.875rem;"></i>
            </a>
            <button onclick="pedirExclusao(${f.id}, ${JSON.stringify(f.nome)})"
                    style="display:inline-flex;align-items:center;justify-content:center;
                           width:2rem;height:2rem;border-radius:.5rem;color:#d1d5db;
                           background:transparent;border:none;cursor:pointer;transition:all .2s;"
                    onmouseover="this.style.background='#fee2e2';this.style.color='#ef4444'"
                    onmouseout="this.style.background='transparent';this.style.color='#d1d5db'"
                    title="Excluir">
              <i class="fa-solid fa-trash-can" style="font-size:.875rem;"></i>
            </button>
          </div>
        </td>
      </tr>
      `;
    }).join('') || '<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:2rem;">Nenhuma forma de pagamento encontrada.</td></tr>';

    const total = lista.length;
    const paginas = Math.max(1, Math.ceil(total / POR_PAGINA));
    document.getElementById('pag-info').textContent =
      `Mostrando ${Math.min(inicio+1,total)}–${Math.min(inicio+POR_PAGINA,total)} de ${total} registros`;

    const botoes = document.getElementById('pag-botoes');
    botoes.innerHTML = '';
    for (let i = 1; i <= paginas; i++) {
      const btn = document.createElement('button');
      btn.textContent = i;
      btn.style.cssText = `padding:.25rem .625rem;border-radius:.5rem;font-size:.75rem;border:none;cursor:pointer;
                           background:${i===paginaAtual?'#FAD4DE':'transparent'};
                           color:${i===paginaAtual?'#C9546E':'#9ca3af'};font-weight:${i===paginaAtual?'600':'400'};`;
      btn.onclick = () => { paginaAtual = i; renderTabela(formasFiltradas); };
      botoes.appendChild(btn);
    }
  }

  async function buscarForma() {
    const id = document.getElementById('filtro-id').value.trim();
    if (!id) {
      filtrarStatus();
      return;
    }

    try {
      const res = await fetch(`http://localhost:8080/api/pagamento/listar/${id}`);
      if (!res.ok) {
        formasFiltradas = [];
        renderTabela(formasFiltradas);
        showToast('Forma de pagamento não encontrada.', 'erro');
        return;
      }

      const f = await res.json();
      formasFiltradas = [{
        id: f.id_forma_pagamento,
        nome: f.descricao,
        ativo: f.ativo,
      }];
      paginaAtual = 1;
      renderTabela(formasFiltradas);
    } catch (error) {
      showToast('Erro ao buscar forma de pagamento.', 'erro');
    }
  }

  function filtrarStatus() {
    const status = document.getElementById('filtro-status').value;
    const id = document.getElementById('filtro-id').value.trim();

    if (id) {
      buscarForma();
      return;
    }

    const statusNormalizado = status === 'SIM' ? 'S' : status === 'NAO' ? 'N' : '';
    formasFiltradas = statusNormalizado
      ? formas.filter(f => String(f.ativo).toUpperCase() === statusNormalizado)
      : [...formas];
    paginaAtual = 1;
    renderTabela(formasFiltradas);
  }

  function mostrarTodos() {
    document.getElementById('filtro-id').value = '';
    document.getElementById('filtro-status').value = '';
    formasFiltradas = [...formas];
    paginaAtual = 1;
    renderTabela(formasFiltradas);
  }

  async function carregarFormas() {
    try {
      const res = await fetch('http://localhost:8080/api/todos/pagamento');
      if (!res.ok) {
        showToast('Não foi possível carregar as formas de pagamento.', 'erro');
        return;
      }

      const dados = await res.json();
      formas = dados.map(f => ({
        id: f.id_forma_pagamento,
        nome: f.descricao,
        ativo: f.ativo,
      }));
      formasFiltradas = [...formas];
      paginaAtual = 1;
      renderTabela(formasFiltradas);
    } catch (error) {
      showToast('Erro ao carregar formas de pagamento.', 'erro');
    }
  }

  function pedirExclusao(id, nome) {
    idParaExcluir = id;
    nomeParaExcluir = nome || '';
    document.getElementById('nome-pagamento-exclusao').textContent = nomeParaExcluir
      ? `Forma: ${nomeParaExcluir}`
      : 'Forma de pagamento selecionada.';
    abrirModal('modal-excluir');
  }

  async function confirmarExclusao() {
    fecharModal('modal-excluir');

    try {
      const res = await fetch(`http://localhost:8080/api/pagamento/excluir/${idParaExcluir}`, {
        method: 'DELETE',
      });

      if (!res.ok) {
        showToast('Erro ao excluir forma de pagamento.', 'erro');
        return;
      }

      formas = formas.filter(f => f.id !== idParaExcluir);
      formasFiltradas = formasFiltradas.filter(f => f.id !== idParaExcluir);
      renderTabela(formasFiltradas);
      showToast('Forma de pagamento excluída com sucesso.');
    } catch (error) {
      showToast('Erro de conexão ao excluir.', 'erro');
    }
  }

  carregarFormas();
</script>
</body>
</html>
